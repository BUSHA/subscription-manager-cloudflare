<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#03DAC6"/>
      <stop offset="100%" stop-color="#01a896"/>
    </linearGradient>
  </defs>
  <!-- Sleek dark background with subtle border -->
  <rect width="512" height="512" rx="128" fill="#080808" stroke="#1c1c1c" stroke-width="8"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#222" stroke-width="6"/>

  <!-- Sleek stylized curved subscription cycle arrow -->
  <!-- A beautiful clockwise arc from top-center to top-left -->
  <path d="M 256,96 A 160,160 0 1, 1 106,201" fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round"/>
  
  <!-- Solid, perfectly aligned triangular arrowhead at the top-center -->
  <polygon points="230,56 290,96 230,136" fill="url(#glow)"/>

  <!-- Centered premium credit card -->
  <rect x="176" y="203" width="160" height="106" rx="12" fill="#121212" stroke="url(#glow)" stroke-width="12"/>
  
  <!-- Card Chip -->
  <rect x="196" y="222" width="28" height="20" rx="4" fill="url(#glow)"/>
  
  <!-- Card Lines/Accents -->
  <rect x="196" y="258" width="56" height="8" rx="4" fill="url(#glow)" fill-opacity="0.3"/>
  <rect x="260" y="258" width="32" height="8" rx="4" fill="url(#glow)" fill-opacity="0.3"/>
  
  <!-- Overlapping circles card logo -->
  <circle cx="292" cy="278" r="10" fill="url(#glow)" fill-opacity="0.8"/>
  <circle cx="304" cy="278" r="10" fill="url(#glow)" fill-opacity="0.4"/>
</svg>
